name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      force_run_all:
        description: 'Bypass path-filters and run all jobs'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      shared-types: ${{ steps.filter.outputs.shared-types }}
      azure-adapters: ${{ steps.filter.outputs.azure-adapters }}
      core: ${{ steps.filter.outputs.core }}
      lintable: ${{ steps.filter.outputs.lintable }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared-types:
              - 'packages/shared-types/**'
            azure-adapters:
              - 'packages/azure-adapters/**'
            core:
              - 'services/browser-orchestrator/**'
            lintable:
              - '**/*.{ts,js,json}'
              - 'eslint.config.js'
              - 'tsconfig*.json'

  lint:
    needs: pre-check
    if: |
      github.event_name == 'workflow_dispatch' && inputs.force_run_all ||
      needs.pre-check.outputs.lintable == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --legacy-peer-deps
      - run: npm run lint

  test:
    needs: [pre-check, lint]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --legacy-peer-deps
      
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -e "console.log(require('./services/browser-orchestrator/package.json').dependencies['playwright-core'])")" >> $GITHUB_OUTPUT

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Build Project
        run: npm run build

      - name: Run Azure Adapter Tests
        run: npm test --workspace @capture-automation-platform/azure-adapters

      - name: Run Worker Tests
        run: npm test --workspace @capture-automation-platform/browser-orchestrator
